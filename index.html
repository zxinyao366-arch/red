<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R.E.D 消消乐 </title>
    <style>
        :root { --red: #e60012; --gold: #ffd700; --bg: #0a0a0a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg); color: white; font-family: 'PingFang SC', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 10px; margin: 0; min-height: 100vh; overflow-y: auto; 
        }

        /* 顶部统计区 */
        .header { text-align: center; width: 100%; max-width: 400px; margin-bottom: 10px; flex-shrink: 0; }
        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 8px 4px; border-radius: 10px; border: 1px solid rgba(230,0,18,0.3); }
        .stat-label { font-size: 0.7rem; color: #888; display: block; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: var(--gold); }

        /* 6x10 棋盘容器 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 6px; 
            background: #1a1a1a; padding: 10px; 
            border-radius: 15px; border: 2px solid #333; 
            width: 95vw; max-width: 400px; 
            margin: 10px auto; flex-shrink: 0;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* 方块基础 */
        .tile { 
            width: 100%; aspect-ratio: 1 / 1; border-radius: 8px; 
            cursor: pointer; background: #222; position: relative; 
            display: flex; align-items: center; justify-content: center;
            overflow: visible; /* 允许发光效果溢出 */
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .tile img { 
            width: 100%; height: 100%; object-fit: cover; 
            border-radius: 6px; pointer-events: none; 
        }

        /* --- 核心修复：选中特效 --- */
        .tile.selected { 
            z-index: 10;
            transform: scale(1.15); /* 明显放大 */
            outline: 3px solid #fff;
            box-shadow: 0 0 20px 8px rgba(255, 255, 255, 0.8); /* 强力白色发光 */
            animation: pulse 1s infinite alternate; /* 增加呼吸感 */
        }
        @keyframes pulse {
            from { box-shadow: 0 0 15px 5px rgba(255, 255, 255, 0.6); }
            to { box-shadow: 0 0 25px 10px rgba(255, 255, 255, 0.9); }
        }

        /* --- 核心修复：消除特效 --- */
        .tile.eliminating { 
            animation: eliminateAnim 0.3s ease-in forwards;
            pointer-events: none;
        }
        @keyframes eliminateAnim {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); filter: brightness(2); }
            100% { transform: scale(0); opacity: 0; }
        }

        /* 控制按钮 */
        .controls { margin: 15px 0 30px 0; }
        .btn { 
            background: var(--red); color: white; border: none; 
            padding: 12px 35px; border-radius: 25px; cursor: pointer; 
            font-weight: bold; font-size: 1rem; box-shadow: 0 4px 0 #900;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #900; }
        .btn-reset { background: #333; box-shadow: 0 4px 0 #111; }

        /* 弹窗与文字反馈 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .modal-content {
            background: #1a1a1a; border: 2px solid var(--red);
            padding: 30px; border-radius: 20px; text-align: center;
            width: 85%; max-width: 340px;
        }
        #feedback {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2.5rem; font-weight: bold; color: var(--gold);
            text-shadow: 0 0 15px rgba(255,215,0,0.8);
            pointer-events: none; z-index: 1000; opacity: 0;
        }
        .pop-up { animation: popUp 0.8s ease-out forwards; }
        @keyframes popUp {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -60%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(1); }
        }
    </style>
</head>
<body>

    <div id="feedback">Good！</div>

    <div id="disclaimerModal" class="modal-overlay">
        <div class="modal-content">
            <h2>R.E.D 消消乐</h2>
            <p style="text-align: left; font-size: 0.9rem; line-height: 1.6; color: #ccc;">
                • 交换头像，连成3个即可消除。<br>
                • 移动必须产生消除，否则扣除1步。<br>
                • 消除4个及以上奖励1步。<br>
                • 达到目标分升级并大幅恢复体力。
            </p>
            <button class="btn" onclick="acceptDisclaimer()">开启挑战</button>
        </div>
    </div>

    <div id="resultModal" class="modal-overlay">
        <div class="modal-content">
            <h2>挑战结束</h2>
            <span style="color: #888; font-size: 0.9rem;">最终得分</span>
            <div id="finalScore" style="font-size: 3rem; font-weight: bold; color: var(--gold); margin: 10px 0;">0</div>
            <button class="btn" onclick="initGame()">重新开始</button>
        </div>
    </div>

    <div class="header">
        <div style="font-size: 0.8rem; color: #666; margin-bottom: 5px;">最高纪录: <span id="high-score">0</span></div>
        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-label">体力(步数)</span>
                <span id="moves" class="stat-value">35</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">当前分数</span>
                <span id="score" class="stat-value">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">目标/等级</span>
                <span id="goal-level" class="stat-value">500 / 1</span>
            </div>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="controls">
        <button class="btn btn-reset" onclick="confirmReset()">重置游戏</button>
    </div>

    <script>
    const width = 6;
    const height = 10;
    const gridElement = document.getElementById('grid');
    const scoreElement = document.getElementById('score');
    const movesElement = document.getElementById('moves');
    const goalLevelElement = document.getElementById('goal-level');
    const highScoreElement = document.getElementById('high-score');
    
    let squares = [];
    let score = 0;
    let moves = 35; 
    let level = 1;
    let targetScore = 500;
    let highScore = localStorage.getItem('match3_red_best') || 0;
    let firstId = null;
    let isProcessing = false;

    const baseUrl = "https://cdn.jsdelivr.net/gh/zxinyao366-arch/red@main/";
    const memberData = [
        { id: 0, img: baseUrl + 'tile0.jpg' },
        { id: 1, img: baseUrl + 'tile1.jpg' },
        { id: 2, img: baseUrl + 'tile2.jpg' },
        { id: 3, img: baseUrl + 'tile3.jpg' },
        { id: 4, img: baseUrl + 'tile4.jpg' },
        { id: 5, img: baseUrl + 'tile5.jpg' },
        { id: 6, img: baseUrl + 'tile6.jpg' }
    ];

    highScoreElement.innerText = highScore;

    window.onload = function() {
        if (!localStorage.getItem('redGameRulesV3')) {
            document.getElementById('disclaimerModal').style.display = 'flex';
        } else {
            initGame();
        }
    };

    function acceptDisclaimer() {
        localStorage.setItem('redGameRulesV3', 'true');
        document.getElementById('disclaimerModal').style.display = 'none';
        initGame();
    }

    function initGame() {
        document.getElementById('resultModal').style.display = 'none';
        gridElement.innerHTML = '';
        squares = [];
        score = 0;
        moves = 35; 
        level = 1;
        targetScore = 500;
        updateUI();
        isProcessing = false;
        createBoard();
    }

    function updateUI() {
        scoreElement.innerText = score;
        movesElement.innerText = moves;
        goalLevelElement.innerText = `${targetScore} / ${level}`;
        if (score > highScore) {
            highScore = score;
            highScoreElement.innerText = highScore;
            localStorage.setItem('match3_red_best', highScore);
        }
    }

    function createBoard() {
        for (let i = 0; i < width * height; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.id = i;
            gridElement.appendChild(tile);
            squares.push(tile);
        }
        fillBoard();
    }

    function fillBoard() {
        squares.forEach((tile, i) => {
            let randomMember;
            let row = Math.floor(i / width);
            let col = i % width;
            do {
                randomMember = memberData[Math.floor(Math.random() * memberData.length)];
            } while (
                (col > 1 && squares[i-1].dataset.mid == randomMember.id && squares[i-2].dataset.mid == randomMember.id) ||
                (row > 1 && squares[i-width].dataset.mid == randomMember.id && squares[i-width*2].dataset.mid == randomMember.id)
            );
            tile.dataset.mid = randomMember.id;
            tile.innerHTML = `<img src="${randomMember.img}">`;
        });
        if (!hasAvailableMoves()) shuffleBoard();
    }

    gridElement.onclick = function(e) {
        if (isProcessing || moves <= 0) return;
        const target = e.target.closest('.tile');
        if (!target) return;
        const cid = parseInt(target.id);

        if (firstId === null) {
            firstId = cid;
            squares[firstId].classList.add('selected');
        } else {
            const id1 = firstId;
            const id2 = cid;
            const isAdj = Math.abs(Math.floor(id1/width) - Math.floor(id2/width)) + Math.abs((id1%width) - (id2%width)) === 1;

            // 先移除之前的选中样式
            squares[id1].classList.remove('selected');

            if (isAdj) {
                isProcessing = true;
                moves--;
                updateUI();
                swap(id1, id2);
                setTimeout(() => {
                    if (!checkAndProcessMatches()) {
                        swap(id1, id2);
                        showPraise("无效移动", true);
                        isProcessing = false;
                        checkGameState();
                    }
                }, 300);
            } else {
                // 如果点选了非相邻的，切换选择对象
                firstId = cid;
                squares[firstId].classList.add('selected');
                return;
            }
            firstId = null;
        }
    };

    function swap(id1, id2) {
        const m1 = squares[id1].dataset.mid;
        const h1 = squares[id1].innerHTML;
        squares[id1].dataset.mid = squares[id2].dataset.mid;
        squares[id1].innerHTML = squares[id2].innerHTML;
        squares[id2].dataset.mid = m1;
        squares[id2].innerHTML = h1;
    }

    function checkAndProcessMatches() {
        let matches = getMatchIndices();
        if (matches.size > 0) {
            if (matches.size >= 4) { moves += 1; showPraise("连消奖励+1"); }
            else { showPraise(null); }
            score += matches.size * 10;
            updateUI();
            
            // 触发消除动画
            matches.forEach(idx => squares[idx].classList.add('eliminating'));
            
            setTimeout(() => applyGravity(), 300);
            return true;
        }
        return false;
    }

    function applyGravity() {
        for (let c = 0; c < width; c++) {
            let emptySpaces = 0;
            for (let r = height - 1; r >= 0; r--) {
                let idx = r * width + c;
                if (squares[idx].classList.contains('eliminating')) {
                    emptySpaces++;
                } else if (emptySpaces > 0) {
                    let targetIdx = (r + emptySpaces) * width + c;
                    squares[targetIdx].dataset.mid = squares[idx].dataset.mid;
                    squares[targetIdx].innerHTML = squares[idx].innerHTML;
                    squares[idx].classList.add('eliminating'); // 标记为旧位需要清空
                }
            }
            // 填充顶部新出的方块
            for (let r = 0; r < emptySpaces; r++) {
                let idx = r * width + c;
                let m = memberData[Math.floor(Math.random() * memberData.length)];
                squares[idx].dataset.mid = m.id;
                squares[idx].innerHTML = `<img src="${m.img}">`;
                squares[idx].classList.remove('eliminating');
            }
        }
        // 清理所有残留的状态
        squares.forEach(s => s.classList.remove('eliminating'));
        
        setTimeout(() => {
            if (!checkAndProcessMatches()) {
                isProcessing = false;
                if (!hasAvailableMoves()) shuffleBoard();
                checkGameState();
            }
        }, 300);
    }

    function checkGameState() {
        if (score >= targetScore) {
            level++;
            moves += 20; 
            targetScore += 1200; 
            showPraise("LEVEL UP!");
            updateUI();
        } 
        if (moves <= 0 && !isProcessing) {
            document.getElementById('finalScore').innerText = score;
            document.getElementById('resultModal').style.display = 'flex';
        }
    }

    function getMatchIndices() {
        let matchSet = new Set();
        for (let r = 0; r < height; r++) {
            for (let c = 0; c < width - 2; c++) {
                let i = r * width + c;
                if (squares[i].dataset.mid === squares[i+1].dataset.mid && squares[i].dataset.mid === squares[i+2].dataset.mid) {
                    matchSet.add(i); matchSet.add(i+1); matchSet.add(i+2);
                }
            }
        }
        for (let c = 0; c < width; c++) {
            for (let r = 0; r < height - 2; r++) {
                let i = r * width + c;
                if (squares[i].dataset.mid === squares[i+width].dataset.mid && squares[i].dataset.mid === squares[i+width*2].dataset.mid) {
                    matchSet.add(i); matchSet.add(i+width); matchSet.add(i+width*2);
                }
            }
        }
        return matchSet;
    }

    function hasAvailableMoves() {
        for (let i = 0; i < width * height; i++) {
            let r = Math.floor(i / width), c = i % width;
            if (c < width - 1 && testSwap(i, i + 1)) return true;
            if (r < height - 1 && testSwap(i, i + width)) return true;
        }
        return false;
    }

    function testSwap(id1, id2) {
        let mids = squares.map(s => s.dataset.mid);
        [mids[id1], mids[id2]] = [mids[id2], mids[id1]];
        for (let i = 0; i < width * height; i++) {
            let r = Math.floor(i / width), c = i % width;
            if (c < width - 2 && mids[i] === mids[i+1] && mids[i] === mids[i+2]) return true;
            if (r < height - 2 && mids[i] === mids[i+width] && mids[i] === mids[i+width*2]) return true;
        }
        return false;
    }

    function shuffleBoard() {
        let mids = squares.map(s => s.dataset.mid);
        for (let i = mids.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [mids[i], mids[j]] = [mids[j], mids[i]];
        }
        squares.forEach((tile, i) => {
            tile.dataset.mid = mids[i];
            const m = memberData.find(item => item.id == mids[i]);
            tile.innerHTML = `<img src="${m.img}">`;
        });
        showPraise("重新洗牌", false);
    }

    function showPraise(msg, isWarning = false) {
        const f = document.getElementById('feedback');
        f.innerText = msg || ["Good！", "Great！", "Amazing！"][Math.floor(Math.random()*3)];
        f.style.color = isWarning ? "#ff4444" : "var(--gold)";
        f.classList.remove('pop-up');
        void f.offsetWidth;
        f.classList.add('pop-up');
    }

    function confirmReset() { if(confirm("确定重置吗？")) initGame(); }
    </script>
</body>
</html>
