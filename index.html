<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R.E.D 消消乐 </title>
    <style>
        :root { --red: #e60012; --gold: #ffd700; --bg: #0a0a0a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: white; font-family: 'PingFang SC', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; min-height: 100vh; overflow: hidden; }

        /* 弹窗样式 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none; justify-content: center; align-items: center;
            z-index: 9999; padding: 20px;
        }
        .modal-content {
            background: #1a1a1a; border: 2px solid var(--red);
            padding: 25px; border-radius: 20px; text-align: center;
            max-width: 340px; width: 90%; box-shadow: 0 0 30px rgba(230, 0, 18, 0.5);
        }
        .modal-content h2 { color: var(--red); margin: 0 0 15px 0; font-size: 1.5rem; }
        .modal-content p { font-size: 0.95rem; line-height: 1.6; color: #ccc; margin: 10px 0; }
        
        /* 结算数字样式 */
        .result-score { font-size: 3rem; font-weight: bold; color: var(--gold); margin: 10px 0; display: block; }
        .result-detail { font-size: 1.1rem; color: white; margin-bottom: 20px; display: block; }

        /* 统计区 */
        .header { text-align: center; width: 100%; max-width: 420px; margin-top: 5px; }
        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 8px 4px; border-radius: 10px; border: 1px solid rgba(230,0,18,0.2); }
        .stat-label { font-size: 0.65rem; color: #888; display: block; margin-bottom: 2px; }
        .stat-value { font-size: 1.1rem; font-weight: bold; color: var(--gold); }
        .high-score-bar { font-size: 0.8rem; color: #666; margin-bottom: 8px; }

        /* 鼓励文字 */
        #feedback {
            position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3rem; font-weight: bold; color: var(--gold);
            text-shadow: 0 0 15px rgba(255,215,0,0.8);
            pointer-events: none; z-index: 1000; opacity: 0; text-align: center; width: 100%;
        }
        .pop-up { animation: popUp 0.8s ease-out forwards; }
        @keyframes popUp {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -60%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(1); }
        }

        /* 棋盘 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 5px; 
            background: #151515; padding: 8px; border-radius: 12px; border: 2px solid #333; 
            width: 95vw; max-width: 400px; aspect-ratio: 1 / 1;    
        }
        .tile { 
            width: 100%; aspect-ratio: 1 / 1; border-radius: 6px; 
            cursor: pointer; background: #222; border: 1px solid #333; 
            display: flex; align-items: center; justify-content: center; 
            transition: transform 0.2s; position: relative;
        }
        .tile img { width: 100%; height: 100%; object-fit: cover; border-radius: 5px; pointer-events: none; }
        .tile.selected { outline: 3px solid white; transform: scale(1.05); z-index: 10; box-shadow: 0 0 15px white; }
        .eliminating { transform: scale(0); opacity: 0; transition: all 0.3s ease-in; }

        .controls { margin-top: 15px; }
        .btn { 
            background: var(--red); color: white; border: none; 
            padding: 12px 35px; border-radius: 25px; cursor: pointer; 
            font-weight: bold; font-size: 1rem; box-shadow: 0 4px 0 #900;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #900; }
        .signature { position: fixed; bottom: 10px; right: 15px; font-size: 0.7rem; color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="feedback">Good！</div>

    <!-- 规则说明 -->
    <div id="disclaimerModal" class="modal-overlay">
        <div class="modal-content">
            <h2>挑战规则</h2>
            <p style="text-align: left;">
                • 交换头像，凑成3个即可消除。<br>
                • <span style="color:#ff4444; font-weight:bold;">单次移动必消</span>，否则扣除1步体力。<br>
                • 达到目标分<b>等级提升</b>并<b>恢复体力</b>。<br>
                • 消除4个以上头像<b>奖励1步体力</b>。<br>
                • 棋盘无解时将自动重排。
            </p>
            <button class="btn" onclick="acceptDisclaimer()">开启挑战</button>
        </div>
    </div>

    <!-- 结算画面 -->
    <div id="resultModal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="resultTitle">挑战结束</h2>
            <span class="stat-label">最终得分</span>
            <span id="finalScore" class="result-score">0</span>
            <span id="finalDetail" class="result-detail">等级: 1</span>
            <p id="highScoreNote" style="color:var(--gold); font-weight:bold; display:none;">新纪录！</p>
            <button class="btn" onclick="initGame()">重新开始</button>
        </div>
    </div>

    <div class="header">
        <div class="high-score-bar">最高纪录: <span id="high-score">0</span></div>
        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-label">体力(步数)</span>
                <span id="moves" class="stat-value">30</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">当前分数</span>
                <span id="score" class="stat-value">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">目标/等级</span>
                <span id="goal-level" class="stat-value">500 / 1</span>
            </div>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="controls">
        <button class="btn" onclick="confirmReset()">重置游戏</button>
    </div>

    <div class="signature">by SinYo</div>

    <script>
    const width = 7;
    const gridElement = document.getElementById('grid');
    const scoreElement = document.getElementById('score');
    const movesElement = document.getElementById('moves');
    const goalLevelElement = document.getElementById('goal-level');
    const highScoreElement = document.getElementById('high-score');
    
    let squares = [];
    let score = 0;
    let moves = 30; 
    let level = 1;
    let targetScore = 500;
    let highScore = localStorage.getItem('match3_red_best') || 0;
    let firstId = null;
    let isProcessing = false;

    // CDN图片
    const baseUrl = "https://cdn.jsdelivr.net/gh/zxinyao366-arch/red@main/";
    const memberData = [
        { id: 0, img: baseUrl + 'tile0.jpg' },
        { id: 1, img: baseUrl + 'tile1.jpg' },
        { id: 2, img: baseUrl + 'tile2.jpg' },
        { id: 3, img: baseUrl + 'tile3.jpg' },
        { id: 4, img: baseUrl + 'tile4.jpg' },
        { id: 5, img: baseUrl + 'tile5.jpg' },
        { id: 6, img: baseUrl + 'tile6.jpg' }
    ];

    highScoreElement.innerText = highScore;

    window.onload = function() {
        if (!localStorage.getItem('redGameRulesV3')) {
            document.getElementById('disclaimerModal').style.display = 'flex';
        } else {
            initGame();
        }
    };

    function acceptDisclaimer() {
        localStorage.setItem('redGameRulesV3', 'true');
        document.getElementById('disclaimerModal').style.display = 'none';
        initGame();
    }

    function initGame() {
        document.getElementById('resultModal').style.display = 'none';
        gridElement.innerHTML = '';
        squares = [];
        score = 0;
        moves = 30; 
        level = 1;
        targetScore = 500;
        updateUI();
        isProcessing = false;
        createBoard();
    }

    function updateUI() {
        scoreElement.innerText = score;
        movesElement.innerText = moves;
        goalLevelElement.innerText = `${targetScore} / ${level}`;
        if (score > highScore) {
            highScoreElement.innerText = score;
        }
    }

    function createBoard() {
        for (let i = 0; i < width * width; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.id = i;
            tile.dataset.mid = "";
            gridElement.appendChild(tile);
            squares.push(tile);
        }
        fillBoard();
    }

    function fillBoard() {
        squares.forEach((tile, i) => {
            let randomMember;
            let row = Math.floor(i / width);
            let col = i % width;
            do {
                randomMember = memberData[Math.floor(Math.random() * memberData.length)];
            } while (
                (col > 1 && squares[i-1].dataset.mid == randomMember.id && squares[i-2].dataset.mid == randomMember.id) ||
                (row > 1 && squares[i-width].dataset.mid == randomMember.id && squares[i-width*2].dataset.mid == randomMember.id)
            );
            tile.dataset.mid = randomMember.id;
            tile.innerHTML = `<img src="${randomMember.img}" onerror="this.style.visibility='hidden';this.parentElement.style.background='#333'">`;
        });
        if (!hasAvailableMoves()) {
            shuffleBoard(); 
        }
    }

    // 自动洗牌逻辑：解决死局
    function shuffleBoard() {
        let attempts = 0;
        while (!hasAvailableMoves() && attempts < 100) {
            let mids = squares.map(s => s.dataset.mid);
            // 随机打乱数组
            for (let i = mids.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [mids[i], mids[j]] = [mids[j], mids[i]];
            }
            // 重新应用到棋盘
            squares.forEach((tile, i) => {
                tile.dataset.mid = mids[i];
                const member = memberData.find(m => m.id == mids[i]);
                tile.innerHTML = `<img src="${member.img}" onerror="this.style.visibility='hidden';this.parentElement.style.background='#333'">`;
            });
            attempts++;
        }
        showPraise("棋盘重排", false);
    }

    gridElement.onclick = function(e) {
        if (isProcessing || moves <= 0) return;
        const target = e.target.closest('.tile');
        if (!target) return;
        const cid = parseInt(target.id);

        if (firstId === null) {
            firstId = cid;
            squares[firstId].classList.add('selected');
        } else {
            const id1 = firstId;
            const id2 = cid;
            const isAdjacent = Math.abs(Math.floor(id1/width) - Math.floor(id2/width)) + Math.abs((id1%width) - (id2%width)) === 1;

            if (isAdjacent) {
                isProcessing = true;
                moves--; 
                updateUI();
                swap(id1, id2);
                setTimeout(() => {
                    if (checkAndProcessMatches()) {
                        // 消除成功逻辑在内部
                    } else {
                        swap(id1, id2);
                        showPraise("无效移动 -1", true);
                        isProcessing = false;
                        checkGameState();
                    }
                }, 300);
            }
            if(squares[id1]) squares[id1].classList.remove('selected');
            firstId = null;
        }
    };

    function swap(id1, id2) {
        const m1 = squares[id1].dataset.mid;
        const h1 = squares[id1].innerHTML;
        squares[id1].dataset.mid = squares[id2].dataset.mid;
        squares[id1].innerHTML = squares[id2].innerHTML;
        squares[id2].dataset.mid = m1;
        squares[id2].innerHTML = h1;
    }

    function checkAndProcessMatches() {
        let matches = getMatchIndices();
        if (matches.size > 0) {
            if (matches.size >= 4) {
                moves += 1;
                showPraise("技术奖励 +1");
            } else {
                showPraise(null);
            }
            score += matches.size * 10;
            updateUI();
            matches.forEach(idx => squares[idx].classList.add('eliminating'));
            setTimeout(() => applyGravity(), 300);
            return true;
        }
        return false;
    }

    function applyGravity() {
        for (let c = 0; c < width; c++) {
            let emptySpaces = 0;
            for (let r = width - 1; r >= 0; r--) {
                let idx = r * width + c;
                if (squares[idx].classList.contains('eliminating')) {
                    emptySpaces++;
                } else if (emptySpaces > 0) {
                    let targetIdx = (r + emptySpaces) * width + c;
                    squares[targetIdx].dataset.mid = squares[idx].dataset.mid;
                    squares[targetIdx].innerHTML = squares[idx].innerHTML;
                    squares[idx].classList.add('eliminating');
                }
            }
            for (let r = 0; r < emptySpaces; r++) {
                let idx = r * width + c;
                let m = memberData[Math.floor(Math.random() * memberData.length)];
                squares[idx].dataset.mid = m.id;
                squares[idx].innerHTML = `<img src="${m.img}">`;
                squares[idx].classList.remove('eliminating');
            }
        }
        squares.forEach(s => s.classList.remove('eliminating'));
        setTimeout(() => {
            if (!checkAndProcessMatches()) {
                isProcessing = false;
                if (!hasAvailableMoves()) shuffleBoard();
                checkGameState();
            }
        }, 300);
    }

    function checkGameState() {
        if (score >= targetScore) {
            level++;
            moves = 30 + (level * 2); 
            targetScore += 1000 + (level * 200); 
            showPraise("LEVEL UP!");
            updateUI();
        } 
        if (moves <= 0 && !isProcessing) {
            showResult();
        }
    }

    function showResult() {
        const modal = document.getElementById('resultModal');
        const finalScore = document.getElementById('finalScore');
        const finalDetail = document.getElementById('finalDetail');
        const note = document.getElementById('highScoreNote');
        
        finalScore.innerText = score;
        finalDetail.innerText = `到达等级: ${level}`;
        
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('match3_red_best', highScore);
            highScoreElement.innerText = highScore;
            note.style.display = 'block';
        } else {
            note.style.display = 'none';
        }
        modal.style.display = 'flex';
    }

    function showPraise(msg, isWarning = false) {
        const f = document.getElementById('feedback');
        f.innerText = msg || ["Good！", "Great！", "Amazing！"][Math.floor(Math.random()*3)];
        f.style.color = isWarning ? "#ff4444" : "var(--gold)";
        f.classList.remove('pop-up');
        void f.offsetWidth;
        f.classList.add('pop-up');
    }

    function hasAvailableMoves() {
        for (let i = 0; i < width * width; i++) {
            let r = Math.floor(i / width), c = i % width;
            if (c < width - 1) if (testSwap(i, i + 1)) return true;
            if (r < width - 1) if (testSwap(i, i + width)) return true;
        }
        return false;
    }

    function testSwap(id1, id2) {
        let mids = squares.map(s => s.dataset.mid);
        [mids[id1], mids[id2]] = [mids[id2], mids[id1]];
        for (let i = 0; i < width * width; i++) {
            let r = Math.floor(i / width), c = i % width;
            if (c < width - 2 && mids[i] === mids[i+1] && mids[i] === mids[i+2]) return true;
            if (r < width - 2 && mids[i] === mids[i+width] && mids[i] === mids[i+width*2]) return true;
        }
        return false;
    }

    function confirmReset() {
        if(confirm("确定要重置并清空得分吗？")) initGame();
    }

    function getMatchIndices() {
        let matchSet = new Set();
        for (let r = 0; r < width; r++) {
            for (let c = 0; c < width - 2; c++) {
                let i = r * width + c;
                if (squares[i].dataset.mid === squares[i+1].dataset.mid && squares[i].dataset.mid === squares[i+2].dataset.mid) {
                    matchSet.add(i); matchSet.add(i+1); matchSet.add(i+2);
                }
            }
        }
        for (let c = 0; c < width; c++) {
            for (let r = 0; r < width - 2; r++) {
                let i = r * width + c;
                if (squares[i].dataset.mid === squares[i+width].dataset.mid && squares[i].dataset.mid === squares[i+width*2].dataset.mid) {
                    matchSet.add(i); matchSet.add(i+width); matchSet.add(i+width*2);
                }
            }
        }
        return matchSet;
    }
    </script>
</body>
</html>
