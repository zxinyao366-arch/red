<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蔚蓝之境 - 星辰荣耀版</title>
    <style>
        :root {
            --bg-dark: #020617;
            --blue-glow: #38bdf8;
            --accent-cyan: #22d3ee;
            --card-bg: rgba(15, 23, 42, 0.8);
            --tile-size: min(11.5vw, 8.5vh, 58px); 
        }

        * {
            box-sizing: border-box;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- 唯美静谧背景 --- */
        .stars-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
            z-index: -2;
        }

        .night-sky {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }

        .meteor {
            position: absolute;
            width: 1px; height: 100px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
            transform: rotate(-35deg); opacity: 0;
            animation: meteor-slow-fall var(--d) linear infinite;
        }

        @keyframes meteor-slow-fall {
            0% { transform: translate(300px, -300px) rotate(-35deg); opacity: 0; }
            5% { opacity: 0.3; }
            20% { transform: translate(-600px, 600px) rotate(-35deg); opacity: 0; }
            100% { opacity: 0; }
        }

        .meteor:nth-child(1) { left: 90%; top: 0; --d: 25s; animation-delay: 0s; }
        .meteor:nth-child(2) { left: 60%; top: -50px; --d: 35s; animation-delay: 8s; }
        .meteor:nth-child(3) { left: 30%; top: 0; --d: 30s; animation-delay: 15s; }
        .meteor:nth-child(4) { left: 75%; top: 100px; --d: 40s; animation-delay: 2s; }
        .meteor:nth-child(5) { left: 15%; top: -100px; --d: 32s; animation-delay: 22s; }

        /* --- 状态栏 --- */
        .status-bar {
            width: 94%;
            max-width: 440px;
            margin-bottom: 15px;
            padding: 12px 20px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .stats-main { display: flex; justify-content: space-between; align-items: flex-end; }
        .stat-box { text-align: center; flex: 1; }
        .label { font-size: 9px; color: var(--accent-cyan); letter-spacing: 1.5px; opacity: 0.7; text-transform: uppercase; }
        .value { font-size: 24px; font-weight: 800; text-shadow: 0 0 10px rgba(56, 189, 248, 0.4); display: block; }
        .best-value { font-size: 16px; color: #fbbf24; } /* 金色显示最高分 */

        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 10px; }
        #progress-bar { width: 0%; height: 100%; background: var(--blue-glow); transition: width 0.3s; box-shadow: 0 0 12px var(--blue-glow); }

        /* --- 游戏板 --- */
        #game-board {
            display: grid;
            grid-template-columns: repeat(7, var(--tile-size));
            grid-template-rows: repeat(7, var(--tile-size));
            gap: 7px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .tile {
            width: var(--tile-size);
            height: var(--tile-size);
            border-radius: 10px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tile.selected {
            transform: scale(1.1) translateY(-3px);
            z-index: 10;
            border: 2px solid var(--accent-cyan);
            box-shadow: 0 8px 25px rgba(34, 211, 238, 0.6);
        }

        .tile.pop { animation: popAnim 0.35s ease-out forwards; }
        @keyframes popAnim { 
            0% { transform: scale(1); filter: brightness(2); } 
            100% { transform: scale(0); opacity: 0; } 
        }

        /* --- 鼓励语与消息 --- */
        .praise-text {
            position: absolute;
            width: 100%; text-align: center;
            font-size: 28px; font-weight: 900;
            color: white; text-shadow: 0 0 15px var(--blue-glow);
            pointer-events: none; z-index: 100;
            animation: praiseMove 1s ease-out forwards;
        }

        @keyframes praiseMove {
            0% { transform: scale(0.5); opacity: 0; }
            20% { transform: scale(1.2); opacity: 1; }
            100% { transform: translateY(-60px) scale(1); opacity: 0; }
        }

        .overlay-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 36px; font-weight: 900; color: var(--accent-cyan);
            opacity: 0; pointer-events: none; z-index: 200;
        }
        .show-msg { animation: msgAnim 1.6s forwards; }
        @keyframes msgAnim {
            0% { opacity: 0; transform: translate(-50%, 0); }
            15% { opacity: 1; transform: translate(-50%, -50%); }
            85% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -120%); }
        }
    </style>
</head>
<body>
    <div class="stars-bg"></div>
    <div class="night-sky">
        <div class="meteor"></div><div class="meteor"></div>
        <div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>
    </div>

    <div class="status-bar">
        <div class="stats-main">
            <div class="stat-box"><span class="label">Stage</span><span id="level" class="value">1</span></div>
            <div class="stat-box"><span class="label">Score</span><span id="score" class="value">0</span></div>
            <div class="stat-box"><span class="label">Best</span><span id="best-score" class="value best-value">0</span></div>
        </div>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div id="game-board"></div>
    <div id="msg-layer" class="overlay-msg">LEVEL UP</div>

    <script>
        const SIZE = 7; 
        const IMG_COUNT = 6; 
        const images = Array.from({length: IMG_COUNT}, (_, i) => `./${i + 1}.jpg`);

        let grid = [];
        let score = 0;
        let level = 1;
        let highScore = localStorage.getItem('qianna_match_best') || 0;
        let selectedTile = null;
        let isProcessing = false;
        let comboCount = 0;

        const board = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('score');
        const bestDisplay = document.getElementById('best-score');
        const levelDisplay = document.getElementById('level');
        const msgLayer = document.getElementById('msg-layer');
        const progressBar = document.getElementById('progress-bar');

        function init() {
            bestDisplay.innerText = highScore;
            grid = [];
            board.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                grid[r] = [];
                for (let c = 0; c < SIZE; c++) {
                    let type = Math.floor(Math.random() * IMG_COUNT);
                    grid[r][c] = type;
                    const el = document.createElement('div');
                    el.className = 'tile';
                    el.id = `tile-${r}-${c}`;
                    el.onpointerdown = (e) => { e.preventDefault(); handleSelect(r, c); };
                    board.appendChild(el);
                    updateTileEl(r, c);
                }
            }
            silentInit();
        }

        async function silentInit() {
            isProcessing = true;
            while(await resolveMatches(true)) {}
            isProcessing = false;
            checkDeadlock();
        }

        function updateTileEl(r, c) {
            const el = document.getElementById(`tile-${r}-${c}`);
            const type = grid[r][c];
            if (type === -1) {
                el.style.backgroundImage = 'none'; el.style.opacity = '0';
            } else {
                el.style.opacity = '1';
                el.style.backgroundImage = `url('${images[type]}')`;
                el.style.transform = 'scale(1)';
            }
        }

        async function handleSelect(r, c) {
            if (isProcessing) return;
            const el = document.getElementById(`tile-${r}-${c}`);
            if (!selectedTile) {
                selectedTile = { r, c, el };
                el.classList.add('selected');
            } else {
                const dist = Math.abs(r - selectedTile.r) + Math.abs(c - selectedTile.c);
                if (dist === 1) {
                    isProcessing = true;
                    selectedTile.el.classList.remove('selected');
                    await swap(selectedTile.r, selectedTile.c, r, c);
                    comboCount = 0; 
                    if (!await resolveMatches()) { await swap(selectedTile.r, selectedTile.c, r, c); }
                    selectedTile = null;
                    isProcessing = false;
                    checkDeadlock();
                } else {
                    selectedTile.el.classList.remove('selected');
                    selectedTile = { r, c, el }; el.classList.add('selected');
                }
            }
        }

        async function swap(r1, c1, r2, c2) {
            const t1 = grid[r1][c1]; const t2 = grid[r2][c2];
            grid[r1][c1] = t2; grid[r2][c2] = t1;
            updateTileEl(r1, c1); updateTileEl(r2, c2);
            await new Promise(res => setTimeout(res, 250));
        }

        async function resolveMatches(silent = false) {
            let matched = new Set();
            for(let r=0; r<SIZE; r++) for(let c=0; c<SIZE-2; c++) 
                if(grid[r][c]!==-1 && grid[r][c]===grid[r][c+1] && grid[r][c]===grid[r][c+2]) 
                    { matched.add(`${r},${c}`); matched.add(`${r},${c+1}`); matched.add(`${r},${c+2}`); }
            for(let c=0; c<SIZE; c++) for(let r=0; r<SIZE-2; r++) 
                if(grid[r][c]!==-1 && grid[r][c]===grid[r+1][c] && grid[r][c]===grid[r+2][c]) 
                    { matched.add(`${r},${c}`); matched.add(`${r+1},${c}`); matched.add(`${r+2},${c}`); }

            if (matched.size > 0) {
                if (!silent) {
                    comboCount++;
                    updateScore(matched.size);
                    triggerPraise(matched.size, comboCount);
                }
                matched.forEach(pos => {
                    const [r, c] = pos.split(',').map(Number);
                    document.getElementById(`tile-${r}-${c}`).classList.add('pop');
                    grid[r][c] = -1;
                });
                await new Promise(res => setTimeout(res, silent ? 50 : 300));
                await fillGrid(silent);
                await resolveMatches(silent);
                return true;
            }
            return false;
        }

        function updateScore(matchSize) {
            score += matchSize * 10 * level;
            scoreDisplay.innerText = score;
            if (score > highScore) {
                highScore = score;
                bestDisplay.innerText = highScore;
                localStorage.setItem('qianna_match_best', highScore);
            }
            progressBar.style.width = `${(score % 1000) / 10}%`;
            if (score >= level * 1000) { level++; levelDisplay.innerText = level; showMsg("LEVEL UP"); }
        }

        function triggerPraise(size, combo) {
            let txt = "";
            if (combo > 1) txt = `Combo x${combo}!`;
            else if (size === 3) txt = "Nice!";
            else if (size === 4) txt = "Great!";
            else if (size >= 5) txt = "Amazing!";

            const el = document.createElement('div');
            el.className = 'praise-text';
            el.innerText = txt;
            el.style.top = "45%"; 
            board.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        async function fillGrid(silent) {
            for (let c = 0; c < SIZE; c++) {
                let empty = SIZE - 1;
                for (let r = SIZE - 1; r >= 0; r--) {
                    if (grid[r][c] !== -1) {
                        grid[empty][c] = grid[r][c];
                        if (empty !== r) grid[r][c] = -1;
                        empty--;
                    }
                }
                for (let r = empty; r >= 0; r--) { grid[r][c] = Math.floor(Math.random() * IMG_COUNT); }
            }
            for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
                const el = document.getElementById(`tile-${r}-${c}`);
                el.classList.remove('pop'); updateTileEl(r, c);
            }
            await new Promise(res => setTimeout(res, silent ? 50 : 250));
        }

        function checkDeadlock() { if (!hasMoves()) { showMsg("SHUFFLING..."); shuffle(); } }
        function hasMoves() {
            for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
                if (c < SIZE - 1 && canMatch(r, c, r, c + 1)) return true;
                if (r < SIZE - 1 && canMatch(r, c, r + 1, c)) return true;
            }
            return false;
        }
        function canMatch(r1, c1, r2, c2) {
            let temp = grid.map(row => [...row]);
            [temp[r1][c1], temp[r2][c2]] = [temp[r2][c2], temp[r1][c1]];
            for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
                let t = temp[r][c]; if (t === -1) continue;
                if (c < SIZE - 2 && t === temp[r][c+1] && t === temp[r][c+2]) return true;
                if (r < SIZE - 2 && t === temp[r+1][c] && t === temp[r+2][c]) return true;
            }
            return false;
        }
        function shuffle() {
            let tiles = grid.flat();
            for (let i = tiles.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
            }
            let i = 0;
            for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) { grid[r][c] = tiles[i++]; updateTileEl(r, c); }
            if (!hasMoves()) shuffle();
        }
        function showMsg(txt) {
            msgLayer.innerText = txt; msgLayer.classList.add('show-msg');
            setTimeout(() => msgLayer.classList.remove('show-msg'), 1600);
        }
        window.onload = init;
    </script>
</body>
</html>
