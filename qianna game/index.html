<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蔚蓝之境 - Azure Elite</title>
    <style>
        :root {
            --bg-dark: #020617;
            --blue-glow: #38bdf8;
            --accent-cyan: #22d3ee;
            --card-bg: rgba(15, 23, 42, 0.7);
            --tile-size: clamp(50px, 14vw, 65px); /* 响应式方块大小 */
        }

        * {
            box-sizing: border-box;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 动态背景星空 */
        .stars-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
            z-index: -1;
        }
        .stars-bg::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            animation: bgMove 100s linear infinite;
        }

        @keyframes bgMove {
            from { background-position: 0 0; }
            to { background-position: 500px 1000px; }
        }

        /* 玻璃拟态状态栏 */
        .status-bar {
            width: 90%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            padding: 15px 25px;
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .stat-box { text-align: center; }
        .label {
            font-size: 11px;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
            margin-bottom: 4px;
            display: block;
        }
        .value {
            font-size: 28px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            background: linear-gradient(to bottom, #fff, var(--blue-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 游戏容器 */
        #game-board {
            display: grid;
            grid-template-columns: repeat(6, var(--tile-size));
            grid-template-rows: repeat(6, var(--tile-size));
            gap: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        /* 方块样式 */
        .tile {
            width: var(--tile-size);
            height: var(--tile-size);
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tile.selected {
            transform: scale(1.1);
            z-index: 10;
            border: 2px solid var(--accent-cyan);
            box-shadow: 0 0 20px var(--accent-cyan);
            filter: brightness(1.2);
        }

        .tile.pop {
            animation: tilePop 0.4s ease-out forwards;
        }

        @keyframes tilePop {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2) rotate(10deg); filter: brightness(2); opacity: 0.7; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* 提示层 */
        .overlay-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: 900;
            color: var(--accent-cyan);
            text-shadow: 0 0 20px rgba(34, 211, 238, 0.6);
            pointer-events: none;
            opacity: 0;
            z-index: 100;
            white-space: nowrap;
        }

        .show-msg {
            animation: msgAnim 1.5s ease-in-out forwards;
        }

        @keyframes msgAnim {
            0% { opacity: 0; transform: translate(-50%, 0%); }
            20% { opacity: 1; transform: translate(-50%, -50%); }
            80% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -100%); }
        }
    </style>
</head>
<body>

    <div class="stars-bg"></div>

    <div class="status-bar">
        <div class="stat-box">
            <span class="label">Stage</span>
            <span id="level" class="value">1</span>
        </div>
        <div class="stat-box">
            <span class="label">Score</span>
            <span id="score" class="value">0</span>
        </div>
    </div>

    <div id="game-board"></div>

    <div id="msg-layer" class="overlay-msg">LEVEL UP</div>

    <script>
        const SIZE = 6;
        const IMG_COUNT = 10;
        const images = Array.from({length: IMG_COUNT}, (_, i) => `${i + 1}.jpg`);
        const fallbacks = ['#0ea5e9', '#2563eb', '#3b82f6', '#60a5fa', '#1d4ed8', '#1e40af', '#1e3a8a', '#0284c7', '#0369a1', '#075985'];

        let grid = [];
        let score = 0;
        let level = 1;
        let selectedTile = null;
        let isProcessing = false;

        const board = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('score');
        const levelDisplay = document.getElementById('level');
        const msgLayer = document.getElementById('msg-layer');

        function init() {
            grid = [];
            board.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                grid[r] = [];
                for (let c = 0; c < SIZE; c++) {
                    let type;
                    do {
                        type = Math.floor(Math.random() * IMG_COUNT);
                    } while (
                        (r >= 2 && grid[r-1][c] === type && grid[r-2][c] === type) ||
                        (c >= 2 && grid[r][c-1] === type && grid[r][c-2] === type)
                    );
                    grid[r][c] = type;
                    createTileEl(r, c, type);
                }
            }
            checkDeadlock();
        }

        function createTileEl(r, c, type) {
            const el = document.createElement('div');
            el.className = 'tile';
            el.id = `tile-${r}-${c}`;
            el.style.backgroundImage = `url('${images[type]}')`;
            el.style.backgroundColor = fallbacks[type];
            el.onpointerdown = (e) => { e.preventDefault(); handleSelect(r, c); };
            board.appendChild(el);
        }

        async function handleSelect(r, c) {
            if (isProcessing) return;
            const el = document.getElementById(`tile-${r}-${c}`);

            if (!selectedTile) {
                selectedTile = { r, c, el };
                el.classList.add('selected');
            } else {
                const dist = Math.abs(r - selectedTile.r) + Math.abs(c - selectedTile.c);
                if (dist === 1) {
                    isProcessing = true;
                    selectedTile.el.classList.remove('selected');
                    await swap(selectedTile.r, selectedTile.c, r, c);
                    if (!await resolveMatches()) {
                        await swap(selectedTile.r, selectedTile.c, r, c);
                    }
                    selectedTile = null;
                    isProcessing = false;
                    checkDeadlock();
                } else {
                    selectedTile.el.classList.remove('selected');
                    selectedTile = { r, c, el };
                    el.classList.add('selected');
                }
            }
        }

        async function swap(r1, c1, r2, c2) {
            const t1 = grid[r1][c1];
            const t2 = grid[r2][c2];
            grid[r1][c1] = t2;
            grid[r2][c2] = t1;
            renderTile(r1, c1);
            renderTile(r2, c2);
            await new Promise(res => setTimeout(res, 300));
        }

        function renderTile(r, c) {
            const el = document.getElementById(`tile-${r}-${c}`);
            const type = grid[r][c];
            if (type === -1) {
                el.style.opacity = '0';
                el.style.transform = 'scale(0)';
            } else {
                el.style.backgroundImage = `url('${images[type]}')`;
                el.style.backgroundColor = fallbacks[type];
                el.style.opacity = '1';
                el.style.transform = 'scale(1)';
            }
        }

        async function resolveMatches() {
            let matched = new Set();
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE - 2; c++) {
                    if (grid[r][c] !== -1 && grid[r][c] === grid[r][c+1] && grid[r][c] === grid[r][c+2]) {
                        matched.add(`${r},${c}`); matched.add(`${r},${c+1}`); matched.add(`${r},${c+2}`);
                    }
                }
            }
            for (let c = 0; c < SIZE; c++) {
                for (let r = 0; r < SIZE - 2; r++) {
                    if (grid[r][c] !== -1 && grid[r][c] === grid[r+1][c] && grid[r][c] === grid[r+2][c]) {
                        matched.add(`${r},${c}`); matched.add(`${r+1},${c}`); matched.add(`${r+2},${c}`);
                    }
                }
            }

            if (matched.size > 0) {
                score += matched.size * 10 * level;
                scoreDisplay.innerText = score;
                if (score > level * 1000) { level++; levelDisplay.innerText = level; showMessage("LEVEL UP"); }

                matched.forEach(pos => {
                    const [r, c] = pos.split(',').map(Number);
                    document.getElementById(`tile-${r}-${c}`).classList.add('pop');
                    grid[r][c] = -1;
                });

                await new Promise(res => setTimeout(res, 400));
                await fillGrid();
                await resolveMatches();
                return true;
            }
            return false;
        }

        async function fillGrid() {
            for (let c = 0; c < SIZE; c++) {
                let empty = SIZE - 1;
                for (let r = SIZE - 1; r >= 0; r--) {
                    if (grid[r][c] !== -1) {
                        grid[empty][c] = grid[r][c];
                        if (empty !== r) grid[r][c] = -1;
                        empty--;
                    }
                }
                for (let r = empty; r >= 0; r--) {
                    grid[r][c] = Math.floor(Math.random() * IMG_COUNT);
                }
            }
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const el = document.getElementById(`tile-${r}-${c}`);
                    el.classList.remove('pop');
                    renderTile(r, c);
                }
            }
            await new Promise(res => setTimeout(res, 300));
        }

        // --- 死局检测逻辑 ---
        function checkDeadlock() {
            if (!hasPossibleMoves()) {
                showMessage("NO MOVES! SHUFFLING...");
                setTimeout(shuffleBoard, 1500);
            }
        }

        function hasPossibleMoves() {
            // 尝试模拟每一个可能的交换
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    // 尝试向右换
                    if (c < SIZE - 1) {
                        if (testSwap(r, c, r, c + 1)) return true;
                    }
                    // 尝试向下换
                    if (r < SIZE - 1) {
                        if (testSwap(r, c, r + 1, c)) return true;
                    }
                }
            }
            return false;
        }

        function testSwap(r1, c1, r2, c2) {
            // 虚拟交换并检查
            let tempGrid = grid.map(row => [...row]);
            let t = tempGrid[r1][c1];
            tempGrid[r1][c1] = tempGrid[r2][c2];
            tempGrid[r2][c2] = t;

            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    let type = tempGrid[r][c];
                    if (type === -1) continue;
                    if (c < SIZE - 2 && type === tempGrid[r][c+1] && type === tempGrid[r][c+2]) return true;
                    if (r < SIZE - 2 && type === tempGrid[r+1][c] && type === tempGrid[r+2][c]) return true;
                }
            }
            return false;
        }

        function shuffleBoard() {
            let allTiles = grid.flat();
            // 洗牌算法
            for (let i = allTiles.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allTiles[i], allTiles[j]] = [allTiles[j], allTiles[i]];
            }
            // 重新填入
            let idx = 0;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    grid[r][c] = allTiles[idx++];
                    renderTile(r, c);
                }
            }
            // 递归检查：如果重排后还是死局，再排一次
            if (!hasPossibleMoves()) shuffleBoard();
        }

        function showMessage(txt) {
            msgLayer.innerText = txt;
            msgLayer.classList.remove('show-msg');
            void msgLayer.offsetWidth; // 触发重绘
            msgLayer.classList.add('show-msg');
        }

        init();
    </script>
</body>
</html>
